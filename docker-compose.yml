version: '3.8'
services:
  db:
    image: postgres:latest 
    container_name: postgres:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: hevo@123
      POSTGRES_DB: postgres     # This is the DB name inside Docker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data1: